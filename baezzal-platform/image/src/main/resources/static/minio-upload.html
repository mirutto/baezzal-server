<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinIO Image Upload</title>
    <style>
        :root {
            --bg: #f5efe3;
            --panel: rgba(255, 252, 247, 0.88);
            --text: #1c1814;
            --muted: #6c6256;
            --line: rgba(28, 24, 20, 0.12);
            --accent: #d8622b;
            --accent-strong: #8f2d12;
            --success: #1f7a54;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "SUIT", "Pretendard", "Apple SD Gothic Neo", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(216, 98, 43, 0.20), transparent 24rem),
                radial-gradient(circle at right, rgba(31, 122, 84, 0.14), transparent 20rem),
                linear-gradient(135deg, #f7f1e5 0%, #efe2cf 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .panel {
            width: min(100%, 760px);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 28px;
            box-shadow: 0 20px 80px rgba(62, 38, 18, 0.12);
            backdrop-filter: blur(18px);
            padding: 32px;
        }
        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 0.94;
            letter-spacing: -0.04em;
        }
        p { margin: 0; color: var(--muted); line-height: 1.6; }
        .stack { display: grid; gap: 18px; margin-top: 24px; }
        .field { display: grid; gap: 8px; }
        .label { font-size: 0.95rem; font-weight: 700; }
        .dropzone {
            border: 1.5px dashed rgba(216, 98, 43, 0.45);
            border-radius: 24px;
            padding: 28px;
            background: rgba(255, 255, 255, 0.52);
        }
        input[type="file"] { width: 100%; }
        input[type="text"] {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px 16px;
            font: inherit;
            background: rgba(255, 255, 255, 0.82);
            color: var(--text);
        }
        button {
            border: 0;
            border-radius: 999px;
            padding: 15px 20px;
            font: inherit;
            font-weight: 800;
            color: white;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease;
            box-shadow: 0 14px 30px rgba(143, 45, 18, 0.25);
        }
        button:hover { transform: translateY(-1px); }
        button:disabled { cursor: wait; opacity: 0.72; transform: none; }
        .status { min-height: 1.5rem; font-weight: 700; }
        .status[data-state="success"] { color: var(--success); }
        .status[data-state="error"] { color: #af2f2f; }
        .preview {
            margin-top: 20px;
            width: 100%;
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid var(--line);
            display: none;
            background: white;
        }
        .preview img {
            display: block;
            width: 100%;
            max-height: 420px;
            object-fit: cover;
        }
        .meta {
            padding: 16px 18px;
            border-top: 1px solid var(--line);
            display: grid;
            gap: 8px;
        }
        .meta a { color: var(--accent-strong); word-break: break-all; }
    </style>
</head>
<body>
<main class="panel">
    <h1>MinIO direct image upload</h1>
    <div class="stack">
        <p>백엔드에서 presigned URL 을 발급받고, 브라우저가 MinIO로 직접 PUT 업로드합니다. MinIO 버킷 CORS 에 현재 페이지 origin 이 허용돼 있어야 합니다.</p>
        <label class="field">
            <span class="label">Presigned URL API</span>
            <input id="api-url" type="text" value="/api/v1/upload/image/presigned-url">
        </label>
        <div class="dropzone">
            <label class="field">
                <span class="label">Image file</span>
                <input id="file-input" type="file" accept="image/*">
            </label>
        </div>
        <button id="upload-button" type="button">Upload To MinIO</button>
        <div id="status" class="status" aria-live="polite"></div>
        <section id="preview" class="preview">
            <img id="preview-image" alt="uploaded image preview">
            <div class="meta">
                <strong id="object-key"></strong>
                <a id="file-url" href="#" target="_blank" rel="noreferrer"></a>
            </div>
        </section>
    </div>
</main>
<script>
    const fileInput = document.getElementById("file-input");
    const uploadButton = document.getElementById("upload-button");
    const apiUrlInput = document.getElementById("api-url");
    const statusElement = document.getElementById("status");
    const previewElement = document.getElementById("preview");
    const previewImage = document.getElementById("preview-image");
    const objectKeyElement = document.getElementById("object-key");
    const fileUrlElement = document.getElementById("file-url");

    function updateStatus(message, state = "") {
        statusElement.textContent = message;
        statusElement.dataset.state = state;
    }

    async function requestPresignedUrl(file) {
        const response = await fetch(apiUrlInput.value, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                fileName: file.name,
                contentType: file.type || "application/octet-stream"
            })
        });

        if (!response.ok) {
            const errorBody = await response.json().catch(() => null);
            throw new Error(errorBody?.message || "Presigned URL 요청에 실패했습니다.");
        }

        return response.json();
    }

    async function uploadToMinio(file, payload) {
        const uploadResponse = await fetch(payload.uploadUrl, {
            method: "PUT",
            headers: payload.headers,
            body: file
        });

        if (!uploadResponse.ok) {
            throw new Error("MinIO 업로드에 실패했습니다.");
        }
    }

    uploadButton.addEventListener("click", async () => {
        const file = fileInput.files?.[0];
        if (!file) {
            updateStatus("업로드할 이미지를 먼저 선택하세요.", "error");
            return;
        }

        uploadButton.disabled = true;
        previewElement.style.display = "none";
        updateStatus("Presigned URL 발급 중...", "");

        try {
            const apiResponse = await requestPresignedUrl(file);
            updateStatus("MinIO 업로드 중...", "");
            await uploadToMinio(file, apiResponse);
            previewImage.src = apiResponse.fileUrl;
            objectKeyElement.textContent = apiResponse.objectKey;
            fileUrlElement.href = apiResponse.fileUrl;
            fileUrlElement.textContent = apiResponse.fileUrl;
            previewElement.style.display = "block";
            updateStatus("업로드가 완료되었습니다.", "success");
        } catch (error) {
            updateStatus(error.message, "error");
        } finally {
            uploadButton.disabled = false;
        }
    });
</script>
</body>
</html>
